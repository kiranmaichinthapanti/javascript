<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Employee List</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f4f6f8;
            }

            #employees {
                display: flex;
                justify-content: center;
                margin-top: 40px;
            }

            table {
                border-collapse: collapse;
                width: 70%;
                background-color: white;
                box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            }

            thead {
                background-color: #000;
                color: #fff;
            }

            th, td {
                padding: 12px 16px;
                text-align: center;
                border-bottom: 1px solid #ddd;
            }

            th {
                text-transform: uppercase;
                font-size: 14px;
            }

            tbody tr:hover {
                background-color: #f1f1f1;
            }

            tbody tr:nth-child(even) {
                background-color: #fafafa;
            }

            td:last-child {
                font-weight: bold;
                color: green;
            }

            .action-icons {
                display: flex;
                justify-content: center;
                gap: 14px;
            }

            .action-icons i {
                cursor: pointer;
                font-size: 18px;
                padding: 6px;
                border-radius: 6px;
                transition: all 0.3s ease;
            }

            .action-icons .edit {
                color: #0d6efd; /* blue */
            }

            .action-icons .edit:hover {
                background-color: #e7f1ff;
                transform: scale(1.1);
            }

            .action-icons .delete {
                color: #dc3545; /* red */
            }

            .action-icons .delete:hover {
                background-color: #fdeaea;
                transform: scale(1.1);
            }
            .add-employee-btn{
                background-color: #28a745;
                color: #fff;
                padding: 10px 18px;
                font-size: 16px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                box-shadow: 0 4px 8px rgba(0,0,0,0.2);
                transition: background-color 0.3s ease, transform 0.2s ease;
                position: absolute;
                top: 20px;
                right: 20px;
            }

            .add-employee-btn:hover{
                background-color: #218838;
                transform: translateY(-2px);
            }

            .add-employee-btn:active{
                transform: scale(0.97);
            }

        </style>
    </head>
    <body>
        <button class="add-employee-btn" onclick="window.location.href='addEmployee.html'">+ Add Employee</button>

        <div id="employees">

        </div>
        <script>
            async function getEmployees(){
                try {
                    const response = await fetch('http://localhost:3000/employees',{
                        method: 'GET'
                    });
                    const paresedResponse = await response.json();
                    // console.log(paresedResponse);
                    displayEmployees(paresedResponse);
                } catch(error){
                    console.error("Error occurred:", error);
                }
            }
            getEmployees();

            function displayEmployees(employees){
                const employeesDiv = document.getElementById('employees');
                let employeesStr =  `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Salary</th>
                                    <th>IsPermanent</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                employees.forEach(function(employee){
                    employeesStr += `
                        <tr>
                            <td>${employee.id}</td>
                            <td>${employee.name}</td>
                            <td>${employee.department}</td>
                            <td>${employee.salary}</td>
                            <td>${employee.isPermanent}</td>    
                            <td class="action-icons">
                                <i class="fa-solid fa-pen-to-square edit" onclick="editEmployee('${employee.id}')"></i>
                                <i class="fa-solid fa-trash delete" onclick="deleteEmployee('${employee.id}')"></i>
                            </td>
                        
                        </tr>                
                    `;
                });

                employeesStr += `
                        </tbody>
                    </table>
                `;
            
                employeesDiv.innerHTML = employeesStr; 
            // displayEmployees();
                }

                async function deleteEmployee(employeeId){
                    try {
                        const response = await fetch('http://localhost:3000/employees/' + employeeId, {
                            method:'DELETE'
                        });
                        const paresedResponse = await response.json();
                        window.alert("Deleted Successfully")
                        getEmployees();
                    } catch(error){

                    }
                }

                function editEmployee(employeeId){
                    window.location.href = './editEmployee.html?id=' + employeeId;
                }        </script>
        
    </body>
</html>
