<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
            body{
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f2f2f2;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                position: relative;
            }

            #cars{
                display: flex;
                gap: 20px;
            }

            .car-card{
                width: 260px;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                overflow: hidden;
            }

            .car-card img{
                width: 100%;
                height: 160px;
                object-fit: cover;
            }

            .car-header{
                padding: 12px;
                text-align: center;
            }

            .car-brand{
                font-size: 18px;
                font-weight: bold;
            }

            .car-model{
                color: #555;
                margin: 4px 0;
            }

            .car-year{
                font-size: 14px;
                color: #777;
            }

            .car-price{
                margin-top: 8px;
                font-size: 18px;
                font-weight: bold;
                color: green;
            }

            .fa-pen-to-square,
            .fa-trash {
                font-size: 18px;
                cursor: pointer;
                margin: 0 8px;
                transition: color 0.3s ease, transform 0.2s ease;
            }

            /* Edit icon */
            .fa-pen-to-square {
                color: #007bff;
            }

            .fa-pen-to-square:hover {
                color: #0056b3;
                transform: scale(1.1);
            }

            /* Delete icon */
            .fa-trash {
                color: #dc3545;
            }

            .fa-trash:hover {
                color: #a71d2a;
                transform: scale(1.1);
            }

            .add-car-btn{
                background-color: #28a745;
                color: #fff;
                padding: 10px 18px;
                font-size: 16px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                box-shadow: 0 4px 8px rgba(0,0,0,0.2);
                transition: background-color 0.3s ease, transform 0.2s ease;
                position: absolute;
                top: 20px;
                right: 20px;
            }

            .add-car-btn:hover{
                background-color: #218838;
                transform: translateY(-2px);
            }

            .add-car-btn:active{
                transform: scale(0.97);
            }
        </style>
    </head>
    <body>

        <button class="add-car-btn" onclick="window.location.href='addCar.html'">+ Add Car</button>
        <div id="cars">
            
        </div>


        <script>
            async function getCars() {
                try {
                    const response = await fetch('http://localhost:3000/cars', {
                        method: 'GET'
                    });
                    const paresedResponse = await response.json();
                    // console.log(paresedResponse);
                    displayCars(paresedResponse);
                } catch(error) {

                }
            }
            getCars();

            function displayCars(cars) {
                const carsDiv = document.getElementById('cars');
                let carStr = '';

                cars.forEach(function(car){
                    carStr += `
                        <div class="car-card">
                            <img src="${car.image}">
                            <div class="car-header">
                                <div class="car-brand">${car.brand}</div>
                                <div class="car-model">${car.model}</div>
                                <div class="car-year">${car.year}</div>
                                <div class="car-price">${car.price}</div>
                                <div class="car-date">${formatDate(car.createdAt)}</div>
                                <div class="icon-group">
                                    <i class="fa-solid fa-pen-to-square" onclick="editCar('${car.id}')"></i>
                                    <i class="fa-solid fa-trash" onclick="deleteCar('${car.id}')"></i>
                                </div>
                            </div>
                        </div>
                    `;
                });

                carsDiv.innerHTML = carStr;
            }

            function formatDate(date) {
                // 2026-01-09T09:15:00Z
                const months = ['January', 'February', 'March', 'April', 'May', 'June','July', 'August', 'September', 'October', 'November', 'December'];
                const dateObj = new Date(date);

                return `${months[dateObj.getMonth()]}, ${dateObj.getDate()} ${dateObj.getFullYear()}`;
            }

            async function deleteCar(carId) {
                try {
                    const response = await fetch('http://localhost:3000/cars/' + carId, {
                        method: 'DELETE'
                    });
                    const paresedResponse = await response.json();
                    window.alert('Deleted Successfully');
                    getCars();
                } catch(error) {

                }
            }

            function editCar(carId) {
                window.location.href = './editCar.html?id=' + carId;
            }
        </script>
        
    </body>
</html>
