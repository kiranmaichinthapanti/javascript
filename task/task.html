<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="task.css">
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                justify-content: center;
                display: flex;
                align-items: center;
                height: 100vh;
                margin: 0;
                background-color: aliceblue;
            }
            h2{
                position: absolute;
                top: 30px;
                font-style: italic;
            }
            input {
                text-align: center;
                padding: 6px;
                width: 250px;
            }
            button{
                background-color: black;
                color: white;
                border-radius: 10px;
                border: none;
                cursor: pointer;
                padding: 8px;
                margin-top: 10px;
            }
            #details {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding:10px;
                gap:10px;
                width: 380px;
                box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
                border-radius: 1px solid blue;
            }
            .field {
                display: flex;
                align-items: center;
                gap: 10px;
            }
        </style>
    </head>
    <body>
        <h2>Registration</h2>
        <div id="details">
            <div id="field">
                <label>Name:</label>
                <input type="text" placeholder="Enter your Name" id="name">
            </div>
            <div>
                <label>Email:</label>
                <input type="email" placeholder="Enter your Email ID" id="email">
            </div>
            <div>
                <label>Phone No:</label>
                <input type="number" placeholder="Enter your Phone Number" id="phoneNo">
            </div>
            <div>
                <label>Address:</label>
                <input type="text" placeholder="Enter your Address" id="address">
            </div>
                
            <button onclick="register()">Register</button>
        </div>
       
        <script>
            var users=[];
            function register() {
                var name = document.getElementById("name").value;
                var email = document.getElementById("email").value;
                var phoneNo = document.getElementById("phoneNo").value;
                var address = document.getElementById("address").value;
                var user = {
                    name: name,
                    email: email,
                    phoneNo: phoneNo,
                    address: address
                };
                
                // users.push({
                //     name,
                //     email,
                //     phoneNo,
                //     address
                // });
                for (var i = 0;i<users.length; i++){
                    if(users[i].email === email) {
                        console.log("User Already exist");
                        return;
                    }
                }
                users.push(user);
                console.log(users);
            }
        </script>
        
    </body>
</html>
